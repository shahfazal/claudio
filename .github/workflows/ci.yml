name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: |
          uv run python -m pytest \
            --cov=claudio \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=88 \
            tests/

      - name: Upload coverage report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
